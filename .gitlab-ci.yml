stages:
  - test
  - build

default:
  image: node:20
  cache:
    key: npm-cache
    paths:
      - .npm/
  before_script:
    - npm install --cache .npm --prefer-offline

variables:
  # Dummy values — enough for prisma generate and next build (no live DB needed)
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
  AUTH_SECRET: "ci-only-secret"
  ANTHROPIC_API_KEY: "ci-only-key"
  NEXT_TELEMETRY_DISABLED: "1"

typecheck:
  stage: test
  script:
    - npx prisma generate
    - npx tsc --noEmit

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 week
